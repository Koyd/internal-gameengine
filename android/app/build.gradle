apply plugin: 'com.android.application'

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { localProperties.load(it) }
}

def signingProperties = new Properties()
def signingPropertiesFile = rootProject.file('signing.properties')
if (signingPropertiesFile.exists()) {
    signingPropertiesFile.withInputStream { signingProperties.load(it) }
}

def signingValue = { String gradleKey, String envKey ->
    def value = signingProperties.getProperty(gradleKey)
    if (value == null || value.trim().isEmpty()) {
        value = localProperties.getProperty(gradleKey)
    }
    if (value == null || value.trim().isEmpty()) {
        value = project.findProperty(gradleKey)
    }
    if (value == null || value.toString().trim().isEmpty()) {
        value = System.getenv(envKey)
    }
    return value == null ? null : value.toString()
}

def androidReleaseSigning = [
    keystorePath: signingValue('frameworkAndroidKeystorePath', 'FRAMEWORK_ANDROID_KEYSTORE_PATH'),
    keystorePassword: signingValue('frameworkAndroidKeystorePassword', 'FRAMEWORK_ANDROID_KEYSTORE_PASSWORD'),
    keyAlias: signingValue('frameworkAndroidKeyAlias', 'FRAMEWORK_ANDROID_KEY_ALIAS'),
    keyPassword: signingValue('frameworkAndroidKeyPassword', 'FRAMEWORK_ANDROID_KEY_PASSWORD'),
]

def hasAndroidReleaseSigning = androidReleaseSigning.values().every { it != null && !it.trim().isEmpty() }
def hasPartialAndroidReleaseSigning = androidReleaseSigning.values().any { it != null && !it.trim().isEmpty() }
def isReleaseBuild = gradle.startParameter.taskNames.any { it.toLowerCase().contains('release') }

android {
    namespace = "dev.framework.example"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "dev.framework.example"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (hasAndroidReleaseSigning) {
            release {
                storeFile file(androidReleaseSigning.keystorePath)
                storePassword androidReleaseSigning.keystorePassword
                keyAlias androidReleaseSigning.keyAlias
                keyPassword androidReleaseSigning.keyPassword
            }
        }
    }
    buildTypes {
        release {
            if (hasAndroidReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

afterEvaluate {
    if (!hasAndroidReleaseSigning && hasPartialAndroidReleaseSigning) {
        throw new GradleException('Android release signing is partially configured. Set frameworkAndroidKeystorePath, frameworkAndroidKeystorePassword, frameworkAndroidKeyAlias, and frameworkAndroidKeyPassword in android/signing.properties, android/local.properties, ~/.gradle/gradle.properties, or the matching FRAMEWORK_ANDROID_* environment variables.')
    }
    if (isReleaseBuild && !hasAndroidReleaseSigning) {
        throw new GradleException('Android release signing is not configured. Set frameworkAndroidKeystorePath, frameworkAndroidKeystorePassword, frameworkAndroidKeyAlias, and frameworkAndroidKeyPassword in ignored android/signing.properties or android/local.properties.')
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
