appId: com.framework.example
directories:
  output: ../../dist-desktop
files:
  - dist/**
  - package.json
extraResources:
  - from: ../web/dist
    to: web
  - from: ../../projects/example/assets
    to: projects/example/assets
asar: true
npmRebuild: false
linux:
  executableName: framework-example
  target:
    - AppImage
  category: Development
artifactName: framework-example-${version}-${arch}.${ext}
